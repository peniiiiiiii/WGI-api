<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧸 茶熊後台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px}
.topbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.brand{font-size:15px;font-weight:600;display:flex;align-items:center;gap:4px}
.brand .sub{font-size:11px;font-weight:400;color:#888}
#conn-status{font-size:11px}
.container{max-width:1100px;margin:0 auto;padding:14px 12px}
.nav{display:flex;margin-bottom:14px;border-bottom:1px solid #e5e5e5;background:#fff;border-radius:10px 10px 0 0;padding:0 4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{padding:11px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0;font-weight:500;transition:color 0.15s}
.nav button.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.section{display:none}.section.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.metric{background:#fff;border-radius:10px;padding:14px;border:1px solid #eee}
.metric-val{font-size:20px;font-weight:600}
.metric-label{font-size:11px;color:#888;margin-top:3px}
.card{background:#fff;border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid #eee}
.card-title{font-size:14px;font-weight:600;margin-bottom:12px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
th{font-size:11px;color:#888;font-weight:500;text-align:left;padding:0 6px 8px 0;border-bottom:1px solid #eee}
td{padding:9px 6px 9px 0;border-bottom:1px solid #f0f0f0;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap}
.b-paid{background:#e8f5e9;color:#2e7d32}
.b-unpaid{background:#fff3e0;color:#e65100}
.b-done{background:#e0f2f1;color:#00695c}
.b-cancel{background:#fce4ec;color:#c62828}
.b-pending{background:#e3f2fd;color:#1565c0}
button{cursor:pointer;font-family:inherit}
.btn{padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:13px;font-weight:500;transition:background 0.15s}
.btn:hover{background:#f5f5f5}
.btn:active{background:#eee}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{color:#c62828;border-color:#ef9a9a}
.toolbar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:8px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:13px;-webkit-appearance:none}
.toolbar input{flex:1;min-width:130px}
.toolbar select{flex:1;min-width:100px}
.empty{text-align:center;padding:3rem;color:#aaa;font-size:14px}
.loading{text-align:center;padding:1.5rem;color:#aaa;font-size:13px}
.err-bar{background:#ffebee;color:#c62828;padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none;line-height:1.6;border:1px solid #ffcdd2}
.ok-bar{background:#e8f5e9;color:#2e7d32;padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:none;border:1px solid #c8e6c9}
.order-card{background:#fff;border-radius:10px;border:1px solid #eee;padding:13px 14px;margin-bottom:9px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.order-card:active{background:#fafafa}
.order-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.order-card-name{font-weight:600;font-size:14px}
.order-card-date{font-size:11px;color:#aaa;margin-top:2px}
.order-card-bottom{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:100;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:16px 16px 32px;width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:15px;font-weight:600;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #eee}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid #eee}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border-radius:8px;border:1px solid #ddd;font-size:14px;font-family:inherit;-webkit-appearance:none;background:#fff;color:#1a1a1a}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#1a1a1a}
.field textarea{resize:none;min-height:70px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.detail-row:last-child{border:none}
.detail-key{color:#888;flex-shrink:0;margin-right:8px;font-size:12px}
.status-select{padding:7px 10px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;-webkit-appearance:none;min-width:110px}
.notion-link{display:inline-block;margin-top:12px;font-size:12px;color:#1565c0;text-decoration:none;padding:4px 0}
.items-section{margin-top:14px;padding-top:12px;border-top:1px solid #eee}
.items-title{font-size:12px;font-weight:600;color:#666;margin-bottom:8px}
.items-table{width:100%;border-collapse:collapse;font-size:13px}
.items-table th{font-size:11px;color:#aaa;font-weight:500;text-align:left;padding:0 4px 6px 0;border-bottom:1px solid #eee}
.items-table td{padding:7px 4px 7px 0;border-bottom:1px solid #f5f5f5;vertical-align:top;line-height:1.4}
.items-table tr:last-child td{border:none}
.items-total{display:flex;justify-content:flex-end;gap:8px;padding-top:8px;border-top:1px solid #eee;font-size:13px;font-weight:600;margin-top:4px}
.settings-input{width:100%;padding:11px 12px;border-radius:8px;border:1px solid #ddd;font-size:14px;font-family:inherit;-webkit-appearance:none;background:#fff;color:#1a1a1a}
.settings-input:focus{outline:none;border-color:#1a1a1a}
@media(min-width:640px){
  .container{padding:20px}
  .metrics{grid-template-columns:repeat(4,1fr)}
  .fgrid{grid-template-columns:1fr 1fr}
  .overlay{align-items:center;padding:24px}
  .modal{border-radius:12px;max-width:540px;max-height:88vh;padding:24px}
  .modal-handle{display:none}
  .topbar{padding:0 24px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">🧸 茶熊後台 <span class="sub">&nbsp;·&nbsp;<span id="conn-status" style="color:#888">連線中...</span></span></div>
  <button class="btn btn-primary btn-sm" onclick="openNewOrder()">＋ 新增</button>
</div>

<div class="container">
  <div id="err-bar" class="err-bar"></div>
  <div id="ok-bar" class="ok-bar"></div>

  <div class="nav">
    <button class="active" onclick="showTab('dashboard',this)">總覽</button>
    <button onclick="showTab('orders',this)">訂單列表</button>
    <button onclick="showTab('products',this)">商品資料</button>
    <button onclick="showTab('settings',this)">設定</button>
  </div>

  <!-- 總覽 -->
  <div id="tab-dashboard" class="section active">
    <div class="metrics">
      <div class="metric"><div class="metric-val" id="m-total">—</div><div class="metric-label">總訂單數</div></div>
      <div class="metric"><div class="metric-val" id="m-revenue">—</div><div class="metric-label">已收款</div></div>
      <div class="metric"><div class="metric-val" id="m-unpaid">—</div><div class="metric-label">未付款</div></div>
      <div class="metric"><div class="metric-val" id="m-done">—</div><div class="metric-label">已採購</div></div>
    </div>
    <div class="card">
      <div class="card-title">最近訂單</div>
      <div id="recent-list"><div class="loading">載入中...</div></div>
    </div>
  </div>

  <!-- 訂單列表 -->
  <div id="tab-orders" class="section">
    <div class="toolbar">
      <input type="text" id="search" placeholder="搜尋客戶姓名..." oninput="filterOrders()">
      <select id="filter-pay" onchange="filterOrders()">
        <option value="">全部付款</option>
        <option value="已匯款">已匯款</option>
        <option value="尚未付款">未付款</option>
      </select>
      <select id="filter-order" onchange="filterOrders()">
        <option value="">全部狀態</option>
        <option value="已完成採購">已採購</option>
        <option value="未完成">未完成</option>
      </select>
      <button class="btn btn-sm" onclick="loadOrders()">重整</button>
    </div>
    <div id="order-list-wrap"><div class="loading">載入中...</div></div>
  </div>

  <!-- 商品資料 -->
  <div id="tab-products" class="section">
    <div class="card" style="padding:12px 14px">
      <div id="product-table"><div class="loading">載入中...</div></div>
    </div>
  </div>

  <!-- 設定 -->
  <div id="tab-settings" class="section">
    <div class="card">
      <div class="card-title">Notion 資料庫設定</div>
      <div class="field"><label>Vercel 後端網址</label><input class="settings-input" type="text" id="s-api"></div>
      <div class="fgrid">
        <div class="field"><label>商品資料表 ID</label><input class="settings-input" type="text" id="s-products"></div>
        <div class="field"><label>客戶訂單／總表 ID</label><input class="settings-input" type="text" id="s-orders"></div>
      </div>
      <div class="field"><label>客戶訂單／明細 ID</label><input class="settings-input" type="text" id="s-items"></div>
      <button class="btn btn-primary" onclick="saveSettings()" style="width:100%;margin-top:4px">儲存並重新連線</button>
    </div>
    <div class="card">
      <div class="card-title">新增月份資料庫</div>
      <p style="font-size:13px;color:#888;margin-bottom:12px">每個月新開資料庫時在這裡登記，系統即可跨月查詢所有訂單。</p>
      <div class="fgrid" style="margin-bottom:8px">
        <div class="field"><label>月份標籤（如 2026/05）</label><input class="settings-input" type="text" id="m-label" placeholder="2026/05"></div>
        <div class="field"><label>總表 ID</label><input class="settings-input" type="text" id="m-orders"></div>
      </div>
      <div class="fgrid" style="margin-bottom:12px">
        <div class="field"><label>明細 ID</label><input class="settings-input" type="text" id="m-items"></div>
        <div class="field"><label>商品資料表 ID</label><input class="settings-input" type="text" id="m-products"></div>
      </div>
      <button class="btn" onclick="addMonth()" style="width:100%">新增月份</button>
      <div id="month-list" style="margin-top:12px"></div>
    </div>
  </div>
</div>

<!-- 訂單詳情 Modal -->
<div id="detail-modal" class="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="detail-title">訂單詳情</div>
    <div id="detail-body"></div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal('detail-modal')">關閉</button>
    </div>
  </div>
</div>

<!-- 新增訂單 Modal -->
<div id="new-modal" class="overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">新增訂單</div>
    <div class="fgrid">
      <div class="field"><label>客戶姓名 *</label><input type="text" id="n-name" placeholder="01-王小明"></div>
      <div class="field"><label>電話</label><input type="tel" id="n-phone" placeholder="0912345678"></div>
    </div>
    <div class="fgrid">
      <div class="field"><label>訂購管道</label>
        <select id="n-channel">
          <option>Line 官方</option>
          <option>Line 私訊</option>
          <option>Instagram</option>
          <option>其他</option>
        </select>
      </div>
      <div class="field"><label>訂購日期</label><input type="date" id="n-date"></div>
    </div>
    <div class="field"><label>備註</label><textarea id="n-note" placeholder="特殊需求..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal('new-modal')">取消</button>
      <button class="btn btn-primary btn-sm" id="create-btn" onclick="createOrder()">建立訂單</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_API='https://wgi-api.vercel.app';
const DEFAULT_DB_ORDERS='334efe43aea08127a792e757ab1f9d7b';
const DEFAULT_DB_ITEMS='334efe43aea08137ae52c33a3f40b074';
const DEFAULT_DB_PRODUCTS='334efe43aea080c68870caabf336e539';

let cfg={api:DEFAULT_API,dbOrders:DEFAULT_DB_ORDERS,dbItems:DEFAULT_DB_ITEMS,dbProducts:DEFAULT_DB_PRODUCTS};
let months=[];
let allOrders=[];
const mobile=()=>window.innerWidth<640;

function loadCfg(){
  try{const s=localStorage.getItem('cx_cfg');if(s)cfg={...cfg,...JSON.parse(s)}}catch(e){}
  try{const m=localStorage.getItem('cx_months');if(m)months=JSON.parse(m)}catch(e){}
  document.getElementById('s-api').value=cfg.api;
  document.getElementById('s-products').value=cfg.dbProducts;
  document.getElementById('s-orders').value=cfg.dbOrders;
  document.getElementById('s-items').value=cfg.dbItems;
  renderMonthList();
}

function saveSettings(){
  cfg.api=document.getElementById('s-api').value.trim().replace(/\/$/,'');
  cfg.dbProducts=document.getElementById('s-products').value.trim();
  cfg.dbOrders=document.getElementById('s-orders').value.trim();
  cfg.dbItems=document.getElementById('s-items').value.trim();
  try{localStorage.setItem('cx_cfg',JSON.stringify(cfg))}catch(e){}
  showOk('設定已儲存！');setTimeout(loadAll,400);
}

function addMonth(){
  const label=document.getElementById('m-label').value.trim();
  const orders=document.getElementById('m-orders').value.trim();
  if(!label||!orders)return showErr('請填寫月份標籤和總表 ID');
  months.push({label,orders,items:document.getElementById('m-items').value.trim(),products:document.getElementById('m-products').value.trim()});
  try{localStorage.setItem('cx_months',JSON.stringify(months))}catch(e){}
  ['m-label','m-orders','m-items','m-products'].forEach(id=>document.getElementById(id).value='');
  renderMonthList();showOk('月份已新增！');setTimeout(loadAll,400);
}

function removeMonth(i){
  months.splice(i,1);
  try{localStorage.setItem('cx_months',JSON.stringify(months))}catch(e){}
  renderMonthList();
}

function renderMonthList(){
  const el=document.getElementById('month-list');
  if(!months.length){el.innerHTML='<p style="font-size:13px;color:#aaa">目前只有預設月份（2026/04）</p>';return}
  el.innerHTML=months.map((m,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:13px"><span>${m.label}</span><button class="btn btn-sm btn-danger" onclick="removeMonth(${i})">移除</button></div>`).join('');
}

async function api(path,method,body){
  const url=`${cfg.api}/api/notion?path=${encodeURIComponent(path)}`;
  const r=await fetch(url,{method:method||'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})});
  const data=await r.json();
  if(!r.ok)throw new Error(data.error||data.message||r.status);
  return data;
}

async function queryDb(dbId,filter){
  const body={page_size:100};
  if(filter)body.filter=filter;
  const data=await api(`databases/${dbId}/query`,'POST',body);
  return data.results||[];
}

function gp(props,key,type){
  const p=props[key];if(!p)return type==='number'?0:'';
  if(type==='title')return(p.title||[]).map(t=>t.plain_text).join('')||'';
  if(type==='number')return p.number||0;
  if(type==='select')return p.select?.name||'';
  if(type==='multi_select')return(p.multi_select||[]).map(s=>s.name).join(', ')||'';
  if(type==='date')return p.date?.start||'';
  if(type==='rich_text')return(p.rich_text||[]).map(t=>t.plain_text).join('')||'';
  if(type==='phone')return p.phone_number||'';
  if(type==='rollup')return p.rollup?.number||0;
  if(type==='formula_number')return p.formula?.number||0;
  return'';
}

function parseOrder(page){
  const p=page.properties;
  // 訂購管道嘗試 select，若空再試 multi_select
  const channel=gp(p,'訂購管道','select')||gp(p,'訂購管道','multi_select');
  return{
    id:page.id,
    name:gp(p,'訂購姓名','title'),
    channel,
    date:gp(p,'訂購日期','date'),
    total:Number(gp(p,'總金額','rollup')||gp(p,'總金額','number')||0),
    payStatus:gp(p,'付款狀態','select'),
    orderStatus:gp(p,'訂單狀態','select'),
    note:gp(p,'備註','rich_text'),
    phone:gp(p,'電話','phone')||gp(p,'電話','rich_text')||'',
  };
}

function setStatus(text,ok){
  const el=document.getElementById('conn-status');
  el.textContent=text;
  el.style.color=ok===true?'#2e7d32':ok===false?'#c62828':'#888';
}

async function loadOrders(){
  document.getElementById('order-list-wrap').innerHTML='<div class="loading">從 Notion 載入中...</div>';
  document.getElementById('recent-list').innerHTML='<div class="loading">載入中...</div>';
  setStatus('連線中...',null);
  try{
    const ids=[cfg.dbOrders,...months.map(m=>m.orders).filter(Boolean)];
    const results=await Promise.all(ids.map(id=>queryDb(id)));
    allOrders=results.flat().map(parseOrder).filter(o=>o.name);
    setStatus('已連線 ✓',true);
    renderMetrics();renderRecent();renderOrders();
  }catch(e){
    setStatus('連線失敗',false);
    showErr('載入失敗：'+e.message);
    document.getElementById('order-list-wrap').innerHTML='<div class="empty">載入失敗</div>';
    document.getElementById('recent-list').innerHTML='<div class="empty">—</div>';
  }
}

async function loadProducts(){
  document.getElementById('product-table').innerHTML='<div class="loading">載入中...</div>';
  try{
    const pages=await queryDb(cfg.dbProducts);
    const list=pages.map(p=>({
      name:gp(p.properties,'商品名稱','title'),
      price:gp(p.properties,'訂價','number'),
      count:gp(p.properties,'訂購數量','rollup'),
      total:gp(p.properties,'項目總額','rollup')||gp(p.properties,'項目總...','rollup'),
    })).filter(p=>p.name);
    if(!list.length){document.getElementById('product-table').innerHTML='<div class="empty">無商品資料</div>';return}
    document.getElementById('product-table').innerHTML=`<table>
      <thead><tr><th style="width:42%">商品名稱</th><th style="width:18%">訂價</th><th style="width:12%">數量</th><th style="width:28%">總額</th></tr></thead>
      <tbody>${list.map(p=>`<tr><td title="${p.name}">${p.name}</td><td>NT$${Number(p.price).toLocaleString()}</td><td>${p.count}</td><td>NT$${Number(p.total).toLocaleString()}</td></tr>`).join('')}</tbody>
    </table>`;
  }catch(e){document.getElementById('product-table').innerHTML='<div class="empty">載入失敗：'+e.message+'</div>'}
}

function renderMetrics(){
  document.getElementById('m-total').textContent=allOrders.length;
  document.getElementById('m-revenue').textContent='NT$'+allOrders.reduce((a,o)=>a+(o.payStatus==='已匯款'?o.total:0),0).toLocaleString();
  document.getElementById('m-unpaid').textContent=allOrders.filter(o=>o.payStatus!=='已匯款').length;
  document.getElementById('m-done').textContent=allOrders.filter(o=>o.orderStatus==='已完成採購').length;
}

function orderCard(o){
  return`<div class="order-card" onclick="viewOrder('${o.id}')">
    <div class="order-card-top">
      <div><div class="order-card-name">${o.name}</div><div class="order-card-date">${o.date||''} ${o.channel?'· '+o.channel:''}</div></div>
      <div>${payBadge(o.payStatus)}</div>
    </div>
    <div class="order-card-bottom">
      <span style="font-size:13px;font-weight:500">NT$${o.total.toLocaleString()}</span>
      ${orderBadge(o.orderStatus)}
    </div>
  </div>`;
}

function desktopRow(o){
  return`<tr>
    <td title="${o.name}">${o.name}</td>
    <td>${o.date?o.date.slice(5):'-'}</td>
    <td>NT$${o.total.toLocaleString()}</td>
    <td>${payBadge(o.payStatus)}</td>
    <td>${orderBadge(o.orderStatus)}</td>
    <td><button class="btn btn-sm" onclick="viewOrder('${o.id}')">詳情</button></td>
  </tr>`;
}

function renderRecent(){
  const list=allOrders.slice(0,5);
  if(!list.length){document.getElementById('recent-list').innerHTML='<div class="empty">尚無資料</div>';return}
  document.getElementById('recent-list').innerHTML=mobile()
    ?list.map(orderCard).join('')
    :`<table><thead><tr><th style="width:28%">客戶</th><th style="width:12%">日期</th><th style="width:15%">金額</th><th style="width:16%">付款</th><th style="width:17%">訂單</th><th style="width:12%"></th></tr></thead><tbody>${list.map(desktopRow).join('')}</tbody></table>`;
}

function filterOrders(){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const fp=document.getElementById('filter-pay')?.value||'';
  const fo=document.getElementById('filter-order')?.value||'';
  const list=allOrders.filter(o=>
    (!q||o.name.toLowerCase().includes(q)||o.phone.includes(q))&&
    (!fp||o.payStatus===fp)&&
    (!fo||o.orderStatus===fo)
  );
  const wrap=document.getElementById('order-list-wrap');
  if(!list.length){wrap.innerHTML='<div class="empty">沒有符合條件的訂單</div>';return}
  wrap.innerHTML=mobile()
    ?list.map(orderCard).join('')
    :`<div class="card" style="padding:10px 14px"><table><thead><tr><th style="width:24%">客戶</th><th style="width:10%">日期</th><th style="width:13%">金額</th><th style="width:14%">付款</th><th style="width:17%">訂單</th><th style="width:22%">操作</th></tr></thead><tbody>${list.map(desktopRow).join('')}</tbody></table></div>`;
}

function renderOrders(){filterOrders()}

function payBadge(s){
  return s==='已匯款'
    ?'<span class="badge b-paid">已匯款</span>'
    :'<span class="badge b-unpaid">'+(s||'尚未付款')+'</span>';
}
function orderBadge(s){
  if(s==='已完成採購')return'<span class="badge b-done">已完成採購</span>';
  if(s==='已取消')return'<span class="badge b-cancel">已取消</span>';
  return'<span class="badge b-pending">'+(s||'處理中')+'</span>';
}

async function viewOrder(id){
  const o=allOrders.find(x=>x.id===id);if(!o)return;
  document.getElementById('detail-title').textContent=o.name;
  document.getElementById('detail-body').innerHTML=`
    <div class="detail-row"><span class="detail-key">電話</span><span>${o.phone||'—'}</span></div>
    <div class="detail-row"><span class="detail-key">訂購管道</span><span>${o.channel||'—'}</span></div>
    <div class="detail-row"><span class="detail-key">訂購日期</span><span>${o.date||'—'}</span></div>
    <div class="detail-row"><span class="detail-key">總金額</span><span style="font-weight:600">NT$${o.total.toLocaleString()}</span></div>
    <div class="detail-row"><span class="detail-key">付款狀態</span>
      <select class="status-select" onchange="updateStatus('${o.id}','付款狀態',this.value)">
        <option ${o.payStatus==='已匯款'?'selected':''}>已匯款</option>
        <option ${o.payStatus!=='已匯款'?'selected':''}>尚未付款</option>
      </select>
    </div>
    <div class="detail-row"><span class="detail-key">訂單狀態</span>
      <select class="status-select" onchange="updateStatus('${o.id}','訂單狀態',this.value)">
        <option ${o.orderStatus==='已完成採購'?'selected':''}>已完成採購</option>
        <option ${o.orderStatus==='未完成'?'selected':''}>未完成</option>
        <option ${o.orderStatus==='已取消'?'selected':''}>已取消</option>
      </select>
    </div>
    ${o.note?`<div class="detail-row"><span class="detail-key">備註</span><span style="text-align:right;max-width:68%;white-space:normal;line-height:1.5">${o.note}</span></div>`:''}
    <div class="items-section">
      <div class="items-title">訂購明細</div>
      <div id="order-items-wrap"><div class="loading" style="padding:0.8rem 0">載入中...</div></div>
    </div>
    <a class="notion-link" href="https://www.notion.so/${o.id.replace(/-/g,'')}" target="_blank">在 Notion 中開啟 →</a>`;
  document.getElementById('detail-modal').style.display='flex';
  loadOrderItems(o.id);
}

async function loadOrderItems(orderId){
  const wrap=document.getElementById('order-items-wrap');
  if(!wrap)return;
  try{
    const allItemDbs=[cfg.dbItems,...months.map(m=>m.items).filter(Boolean)];
    let items=[];
    for(const dbId of allItemDbs){
      if(!dbId)continue;
      try{
        const pages=await queryDb(dbId,{property:'訂購人',relation:{contains:orderId}});
        items=[...items,...pages.map(p=>({
          name:gp(p.properties,'訂購類別','title'),
          qty:gp(p.properties,'訂購數量','number')||1,
          price:gp(p.properties,'商品單價','rollup')||gp(p.properties,'商品單價','number')||0,
          total:gp(p.properties,'總價','formula_number')||gp(p.properties,'總價','number')||gp(p.properties,'總價','rollup')||0,
        })).filter(i=>i.name)];
      }catch(e){}
    }
    if(!items.length){wrap.innerHTML='<p style="font-size:13px;color:#aaa;padding:6px 0">無明細資料</p>';return}
    const grandTotal=items.reduce((a,i)=>a+Number(i.total),0);
    wrap.innerHTML=`<table class="items-table">
      <thead><tr><th style="width:48%">商品</th><th style="width:12%">數量</th><th style="width:18%">單價</th><th style="width:22%">小計</th></tr></thead>
      <tbody>${items.map(i=>`<tr>
        <td>${i.name}</td>
        <td>${i.qty}</td>
        <td>NT$${Number(i.price).toLocaleString()}</td>
        <td>NT$${Number(i.total).toLocaleString()}</td>
      </tr>`).join('')}</tbody>
    </table>
    <div class="items-total">合計 <strong>NT$${grandTotal.toLocaleString()}</strong></div>`;
  }catch(e){wrap.innerHTML='<p style="font-size:13px;color:#c62828">載入失敗：'+e.message+'</p>'}
}

async function updateStatus(pageId,field,value){
  try{
    await api(`pages/${pageId}`,'PATCH',{properties:{[field]:{select:{name:value}}}});
    const o=allOrders.find(x=>x.id===pageId);
    if(o){if(field==='付款狀態')o.payStatus=value;else o.orderStatus=value;}
    showOk('已更新到 Notion ✓');
  }catch(e){showErr('更新失敗：'+e.message)}
}

function openNewOrder(){
  document.getElementById('n-date').value=new Date().toISOString().slice(0,10);
  ['n-name','n-phone','n-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('new-modal').style.display='flex';
}

async function createOrder(){
  const name=document.getElementById('n-name').value.trim();
  if(!name)return showErr('請填寫客戶姓名');
  const btn=document.getElementById('create-btn');
  btn.textContent='建立中...';btn.disabled=true;
  const channel=document.getElementById('n-channel').value;
  const props={
    '訂購姓名':{title:[{text:{content:name}}]},
    '訂購管道':{select:{name:channel}},
  };
  const date=document.getElementById('n-date').value;
  if(date)props['訂購日期']={date:{start:date}};
  const note=document.getElementById('n-note').value;
  if(note)props['備註']={rich_text:[{text:{content:note}}]};
  const phone=document.getElementById('n-phone').value.trim();
  if(phone)props['電話']={phone_number:phone};
  try{
    await api('pages','POST',{parent:{database_id:cfg.dbOrders},properties:props});
    closeModal('new-modal');
    showOk('訂單已建立到 Notion！');
    setTimeout(loadOrders,800);
  }catch(e){showErr('建立失敗：'+e.message)}
  finally{btn.textContent='建立訂單';btn.disabled=false;}
}

function closeModal(id){document.getElementById(id).style.display='none'}
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.style.display='none'}));

function showTab(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');btn.classList.add('active');
  if(id==='orders'){if(!allOrders.length)loadOrders();else renderOrders();}
  if(id==='products')loadProducts();
  if(id==='dashboard'&&!allOrders.length)loadAll();
}
function showErr(msg){const e=document.getElementById('err-bar');e.textContent=msg;e.style.display='block';setTimeout(()=>e.style.display='none',6000)}
function showOk(msg){const e=document.getElementById('ok-bar');e.textContent=msg;e.style.display='block';setTimeout(()=>e.style.display='none',4000)}
function loadAll(){loadOrders();loadProducts()}

loadCfg();loadAll();
</script>
</body>
</html>
